<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navi Dashboard — JARVIS Edition</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.17/paper-full.min.js"></script>
</head>
<body>
  <!-- Edit Mode Toggle Bar -->
  <div id="edit-bar">
    <span class="edit-title">🎨 編輯模式</span>
    <div class="edit-controls">
      <label class="toggle">
        <input type="checkbox" id="edit-mode-toggle">
        <span>開啟編輯</span>
      </label>

      <!-- SYSTEM MODE SWITCHER -->
      <div id="system-mode-switcher" class="toolbar-group hidden">
        <button class="sys-mode-btn active" data-sysmode="arranger" title="佈局模式: 拖曳與排版元件">佈局模式 (Arranger)</button>
        <button class="sys-mode-btn" data-sysmode="studio" title="設計模式: 自訂繪製幾何圖形">設計模式 (Studio)</button>
        <span class="tool-separator">|</span>
      </div>

      <button id="add-widget-btn" class="arranger-tool">+ 新增元件</button>
      <button id="add-element-btn" class="arranger-tool">+ 新增元素</button>
      
      <!-- DRAWING TOOLBAR -->
      <div id="drawing-toolbar" class="toolbar-group hidden studio-tool">
        <span class="tool-separator">|</span>
        <button class="draw-tool active" data-tool="select" title="選取/移動 (Select)">↖</button>
        <button class="draw-tool" data-tool="line" title="直線 (Line)">╱</button>
        <button class="draw-tool" data-tool="rect" title="矩形 (Rectangle)">▭</button>
        <button class="draw-tool" data-tool="circle" title="圓形 (Circle)">◯</button>
        <button class="draw-tool" data-tool="ellipse" title="橢圓 (Ellipse)">⬭</button>
        <button class="draw-tool" data-tool="polygon" title="多邊形 (Polygon)">⬠</button>
        <button class="draw-tool" data-tool="sector" title="扇形 (Sector)">⌔</button>
        <button class="draw-tool" data-tool="text" title="文字 (Text)">T</button>
        <span class="tool-separator">|</span>
        <button class="boolean-tool" data-op="union" title="圖形聯集 (Union)">∪</button>
        <button class="boolean-tool" data-op="intersect" title="圖形交集 (Intersect)">∩</button>
        <button class="boolean-tool" data-op="subtract" title="圖形挖空 (Subtract)">➖</button>
        <span class="tool-separator">|</span>
        <button class="group-tool" id="btn-group" title="群組元件 (Group)">🔗</button>
        <button class="group-tool" id="btn-ungroup" title="解散群組 (Ungroup)">🔓</button>
        <span class="tool-separator">|</span>
        <button id="btn-undo" title="上一步 (Undo)">↩️</button>
        <button id="btn-import-studio" class="studio-tool btn-primary-mini" title="將設計匯入主畫布">📥 匯入主版</button>
      </div>

      <button id="reset-layout-btn" title="重置佈局">🔄</button>
      <button id="export-layout-btn" title="匯出配置">⬇️</button>
      <button id="import-layout-btn" title="匯入配置">⬆️</button>
      <input type="file" id="import-input" style="display: none;" accept=".json">
    </div>
  </div>

  <!-- Main Canvas (draggable/resizable area) -->
  <main id="dashboard-canvas">
    <!-- Grid Overlay -->
    <div class="canvas-grid"></div>
    
    <!-- STUDIO STAGE (Isolated Designer) -->
    <div id="studio-stage" class="hidden">
      <!-- Design elements go here -->
    </div>

    <!-- Drawing Interaction Layer -->
    <svg id="drawing-layer" class="drawing-layer hidden" width="100%" height="100%">
      <path id="temp-draw-path" fill="none" stroke="var(--color-cyan)" stroke-width="2" stroke-dasharray="5,5"></path>
    </svg>
    
  </main>

  <!-- PROPERTY EDITOR SIDEBAR -->
  <aside id="property-editor" class="property-sidebar hidden">
    <div class="sidebar-header">
      <h3>組件設計師</h3>
      <button id="close-sidebar">✕</button>
    </div>
    <div class="sidebar-content">
      <div class="prop-group">
        <label>顯示名稱</label>
        <input type="text" id="prop-title" placeholder="預設標題">
      </div>
      <div class="prop-group">
        <label>主題配色</label>
        <select id="prop-color">
          <option value="cyan">科技青 (Cyan)</option>
          <option value="gold">警告金 (Gold)</option>
          <option value="orange">危險橘 (Orange)</option>
          <option value="green">安全綠 (Green)</option>
        </select>
      </div>
      <div class="prop-group">
        <label>自訂樣式 (Custom Shapes)</label>
        <div style="display:flex; gap:5px; margin-top:5px;">
          <input type="color" id="prop-fill" title="填充顏⾊">
          <input type="color" id="prop-stroke" title="外框顏⾊">
          <input type="number" id="prop-stroke-width" title="外框粗細" value="2" min="0" max="20" style="width:50px;" class="jarvis-input">
        </div>
      </div>
      <div class="prop-group">
        <label>數據路徑 (API)</label>
        <input type="text" id="prop-data" placeholder="e.g. agents.count">
      </div>
      <div id="extra-props">
        <!-- Parametric Geometry Controls -->
        <!-- Rect -->
        <div id="param-rect" class="prop-group hidden">
          <label>矩形大小 (W, H)</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="p-rect-w" title="寬度" placeholder="W" class="jarvis-input">
            <input type="number" id="p-rect-h" title="高度" placeholder="H" class="jarvis-input">
          </div>
        </div>
        <!-- Circle -->
        <div id="param-circle" class="prop-group hidden">
          <label>圓形直徑 (Diameter)</label>
          <input type="number" id="p-circ-d" title="直徑" class="jarvis-input" style="width:100%;">
        </div>
        <!-- Ellipse -->
        <div id="param-ellipse" class="prop-group hidden">
          <label>橢圓直徑 (X, Y)</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="p-ell-rx" title="水平直徑" placeholder="Rx" class="jarvis-input">
            <input type="number" id="p-ell-ry" title="垂直直徑" placeholder="Ry" class="jarvis-input">
          </div>
        </div>
        <!-- Sector -->
        <div id="param-sector" class="prop-group hidden">
          <label>扇形參數 (半徑, 起始°, 結束°)</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="p-sec-r" title="半徑" placeholder="R" class="jarvis-input">
            <input type="number" id="p-sec-start" title="起始角度" placeholder="Start°" class="jarvis-input">
            <input type="number" id="p-sec-end" title="結束角度" placeholder="End°" class="jarvis-input">
          </div>
        </div>
        <!-- Polygon -->
        <div id="param-polygon" class="prop-group hidden">
          <label>多邊形 (邊長, 邊數)</label>
          <div style="display:flex; gap:5px;">
            <input type="number" id="p-poly-r" title="外接圓半徑" placeholder="半徑" class="jarvis-input">
            <input type="number" id="p-poly-sides" title="邊數" placeholder="邊數" min="3" max="20" class="jarvis-input">
          </div>
        </div>
      </div>
    </div>
    <div class="sidebar-footer">
      <button id="apply-props" class="btn-primary">保存變更</button>
    </div>
  </aside>

  <!-- MODAL: ADD WIDGET / ELEMENT -->
  <div id="widget-modal" class="modal hidden">
    <div class="modal-content jarvis-window">
      <div class="modal-header">
        <h2>庫存組件庫</h2>
        <button class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="modal-section" data-group="widget">
          <h3>📦 核心組件 (Widgets)</h3>
          <div class="widget-options">
            <button class="widget-option" data-type="agents">
              <span class="option-icon">🤖</span>
              <span>Agents 狀態</span>
            </button>
            <button class="widget-option" data-type="tasks">
              <span class="option-icon">📋</span>
              <span>任務進度</span>
            </button>
            <button class="widget-option" data-type="system">
              <span class="option-icon">🖥️</span>
              <span>系統負載</span>
            </button>
            <button class="widget-option" data-type="notes">
              <span class="option-icon">✍️</span>
              <span>備忘錄</span>
            </button>
          </div>
        </div>
        
        <div class="modal-section" data-group="element">
          <h3>⚡ 視覺元素 (Elements)</h3>
          <div class="widget-options">
            <button class="widget-option" data-type="gauge">
              <span class="option-icon">📊</span>
              <span>指針表盤</span>
            </button>
            <button class="widget-option" data-type="radar">
              <span class="option-icon">📡</span>
              <span>雷達波盤</span>
            </button>
            <button class="widget-option" data-type="hexagon">
              <span class="option-icon">⬢</span>
              <span>六角數據</span>
            </button>
            <button class="widget-option" data-type="waveform">
              <span class="option-icon">〰️</span>
              <span>動態波形圖</span>
            </button>
            <button class="widget-option" data-type="core-v2">
              <span class="option-icon">⚛️</span>
              <span>核心反應爐 V2</span>
            </button>
            <button class="widget-option" data-type="scanning-grid">
              <span class="option-icon">▦</span>
              <span>掃描網格</span>
            </button>
            <button class="widget-option" data-type="agent-log">
              <span class="option-icon">📜</span>
              <span>Agent 日誌</span>
            </button>
            <button class="widget-option" data-type="hud-center">
              <span class="option-icon">⚙️</span>
              <span>系統總控 HUD</span>
            </button>
            <button class="widget-option" data-type="hud-arc">
              <span class="option-icon">🌙</span>
              <span>動態弧形段</span>
            </button>
            <button class="widget-option" data-type="hud-tag">
              <span class="option-icon">🏷️</span>
              <span>HUD 數據標籤</span>
            </button>
            <button class="widget-option" data-type="hud">
              <span class="option-icon">🎯</span>
              <span>HUD 背景</span>
            </button>
            <button class="widget-option" data-type="clock">
              <span class="option-icon">⏱</span>
              <span>時鐘</span>
            </button>
            <button class="widget-option" data-type="arc">
              <span class="option-icon">🌈</span>
              <span>環形進度</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
