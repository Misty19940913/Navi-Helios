[Rainmeter]
Backgroundmode=1
Author=the Scadnium (based on Ghost in the Shell : Stand Alone Complex - Second Gig)

;Unofficial Clock on the Anime- Ghost in the Shell:Stand Alone Complex;Second Gig !

;Modified by Divineforge (to save RAM Memory footprint)

;changelog (update)
 - slight modify the formula for calculating the hour display, fixed the wrong bar    display for hour.



;=Variable=====================

divxAngle=-1



;=Measure==================================================================

[MeasureSec.Round]
Measure=Calc
Formula=(MeasureSeconds + 1 )% 10 

[MeasureTime]
Measure=time

[MeasureHours]
Measure=Time
Format=%#I
; %H - 24 Hours Format, %#I - 12 Hours Format

[MeasureHours.divx]
Measure=Calc
Formula=MeasureHours % 12
; %H - 24 Hours Format, %#I - 12 Hours Format


[MeasureMinutes]
Measure=TIME
Format=%M

[MeasureSeconds]
Measure=TIME
Format=%S

[MeasureSec]
Measure=Calc
Formula=MeasureTime * 10

;;;;;;;;Meter;;;;;;;;

[MeterTimeH]
MeasureName=MeasureHours.divx
Meter=BITMAP
X=0
Y=15
W=240
H=360
BitmapImage=hourscircle2.png
BitmapFrames=12
BitmapExtend=1
BitmapZeroFrame=1
BitmapAlign=LEFT
BitmapSeparation=0
Hidden=0



[MeterMinute]
Meter=ROTATOR
MeasureName=MeasureTime
X=4
Y=34
W=240
H=240
ImageName=Minutescircle.png
StartAngle=0
RotationAngle=6.2832
ValueReminder=3600
OffsetX=120
OffsetY=120

[MeterSeconds]
MeasureName=MeasureTime
Meter=ROTATOR
X=4
Y=34
W=240
H=240
ImageName=secondcircle2.png
StartAngle=6.2832
RotationAngle=6.2832
ValueReminder=60
OffsetX=120
OffsetY=120
Hidden=0


