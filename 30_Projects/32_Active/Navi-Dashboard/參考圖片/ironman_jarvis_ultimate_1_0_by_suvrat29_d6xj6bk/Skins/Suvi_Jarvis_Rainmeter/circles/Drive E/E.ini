

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500


License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"

;[GATHER DRIVES]==================================

[MeasureTotalDrive3]
Measure=FreeDiskSpace
Drive=#Drive3#
Total=1
UpdateDivider=2

[MeasureFreeDrive3]
Measure=FreeDiskSpace
Drive=#Drive3#
UpdateDivider=2

[MeasureUsedDrive3]
Measure=FreeDiskSpace
Drive=#Drive3#
InvertMeasure=1
UpdateDivider=2



;[MEASURE READS]==================================

[MeasureDrive3Reads]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Read Bytes/sec
PerfMonInstance=#Drive3#
PerfMonDifference=1



;[MEASURE WRITES]=================================

[MeasureDrive3Writes]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Write Bytes/sec
PerfMonInstance=#Drive3#
PerfMonDifference=1


;[READ ACTIONS]====================================

[Drive3ReadsAction]
Measure=Calc
Formula=MeasureDrive3Reads
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive3ReadsOff][!RainmeterShowMeter MeterDrive3ReadsOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive3ReadsOn][!RainmeterShowMeter MeterDrive3ReadsOff]
IfEqualValue=0



;[WRITE ACTIONS]===================================

[Drive3WritesAction]
Measure=Calc
Formula=MeasureDrive3Writes
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive3WritesOff][!RainmeterShowMeter MeterDrive3WritesOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive3WritesOn][!RainmeterShowMeter MeterDrive3WritesOff]
IfEqualValue=0



;[DISPLAY Drive3]========================================

[MeterDrive3TotalRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalDrive3
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor2#
Solid=1
AntiAlias=1
Percentual=1

[MeterDrive3UsedRound]
Meter=ROUNDLINE
MeasureName=MeasureUsedDrive3
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=1
Percentual=1

[MeterFreeDrive3Text%]
MeasureName=MeasureFreeDrive3
Meter=STRING
X=46
Y=38r
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
DynamicVariables=1
Text="%1%"
Percentual=1
AutoScale=1

[MeterTotalDrive3Text]
MeasureName=MeasureTotalDrive3
Meter=STRING
X=100
Y=15
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="[#Drive3#] %1B"
AutoScale=1

;[Drive3 READ LIGHTS]====================================

[MeterDrive3ReadsOn]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\lefton.png
Hidden=1

[MeterDrive3ReadsOff]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\leftoff.png
Hidden=0

;[Drive3 WRITE LIGHTS]====================================

[MeterDrive3WritesOn]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\righton.png
Hidden=1

[MeterDrive3WritesOff]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\rightoff.png
Hidden=0

[MeterFreeDrive3Text]
MeasureName=MeasureFreeDrive3
Meter=STRING
X=100
Y=50
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="%1B"
Postfix=" Free"
AutoScale=1

