

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500


License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"


;[GATHER DRIVES]==================================

[MeasureTotalDrive1]
Measure=FreeDiskSpace
Drive=#Drive1#
Total=1
UpdateDivider=2

[MeasureFreeDrive1]
Measure=FreeDiskSpace
Drive=#Drive1#
UpdateDivider=2

[MeasureUsedDrive1]
Measure=FreeDiskSpace
Drive=#Drive1#
InvertMeasure=1
UpdateDivider=2



;[MEASURE READS]==================================

[MeasureDrive1Reads]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Read Bytes/sec
PerfMonInstance=#Drive1#
PerfMonDifference=1



;[MEASURE WRITES]=================================

[MeasureDrive1Writes]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Write Bytes/sec
PerfMonInstance=#Drive1#
PerfMonDifference=1


;[READ ACTIONS]====================================

[Drive1ReadsAction]
Measure=Calc
Formula=MeasureDrive1Reads
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive1ReadsOff][!RainmeterShowMeter MeterDrive1ReadsOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive1ReadsOn][!RainmeterShowMeter MeterDrive1ReadsOff]
IfEqualValue=0



;[WRITE ACTIONS]===================================

[Drive1WritesAction]
Measure=Calc
Formula=MeasureDrive1Writes
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive1WritesOff][!RainmeterShowMeter MeterDrive1WritesOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive1WritesOn][!RainmeterShowMeter MeterDrive1WritesOff]
IfEqualValue=0



;[DISPLAY Drive1]========================================

[MeterDrive1TotalRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalDrive1
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor2#
Solid=1
AntiAlias=1
Percentual=1

[MeterDrive1UsedRound]
Meter=ROUNDLINE
MeasureName=MeasureUsedDrive1
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=1
Percentual=1

[MeterFreeDrive1Text%]
MeasureName=MeasureFreeDrive1
Meter=STRING
X=46
Y=38r
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
DynamicVariables=1
Text="%1%"
Percentual=1
AutoScale=1

[MeterTotalDrive1Text]
MeasureName=MeasureTotalDrive1
Meter=STRING
X=100
Y=15
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="[#Drive1#] %1B"
AutoScale=1

;[Drive1 READ LIGHTS]====================================

[MeterDrive1ReadsOn]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\lefton.png
Hidden=1

[MeterDrive1ReadsOff]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\leftoff.png
Hidden=0

;[Drive1 WRITE LIGHTS]====================================

[MeterDrive1WritesOn]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\righton.png
Hidden=1

[MeterDrive1WritesOff]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\rightoff.png
Hidden=0

[MeterFreeDrive1Text]
MeasureName=MeasureFreeDrive1
Meter=STRING
X=100
Y=50
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="%1B"
Postfix=" Free"
AutoScale=1

