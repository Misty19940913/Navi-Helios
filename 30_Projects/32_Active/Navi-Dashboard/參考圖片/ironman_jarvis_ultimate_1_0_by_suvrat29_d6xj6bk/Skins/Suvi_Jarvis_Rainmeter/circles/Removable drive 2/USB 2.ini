

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500


License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"



;[GATHER USB DRIVES]================================

[MeasureTotalUSB2]
Measure=FreeDiskSpace
Drive=#USB2#
Total=1
IgnoreRemovable=0
UpdateDivider=2

[CalcUSB2Removed]
Measure=CALC
Formula=MeasureTotalUSB2
Substitute=" G":""," k":""," M":""," T":""
IfBelowValue=1
IfBelowAction=!Execute [!RainmeterHideMeter MeterFreeUSB2TextPercent][!RainmeterShowMeter MeterUSB2UsedRound][!RainmeterHideMeter MeterFreeUSB2Text][!RainmeterShowMeter MeterUSB2Key][!RainmeterShowMeter MeterRemovedUSB2Text]
IfAboveValue=0
IfAboveAction=!Execute [!RainmeterShowMeter MeterFreeUSB2TextPercent][!RainmeterShowMeter MeterUSB2UsedRound][!RainmeterHideMeter MeterRemovedUSB2Text][!RainmeterHideMeter MeterUSB2Key][!RainmeterShowMeter MeterFreeUSB2Text]

[MeasureFreeUSB2]
Measure=FreeDiskSpace
Drive=#USB2#
IgnoreRemovable=0
UpdateDivider=2

[MeasureUsedUSB2]
Measure=FreeDiskSpace
Drive=#USB2#
InvertMeasure=1
IgnoreRemovable=0
UpdateDivider=2





;[DISPLAY USB2]==================================

[MeterUSB2Key]
Meter=IMAGE
ImageName="..\Images\USBKey.png"
X=42
Y=24r
W=25
H=39
Hidden=1

[MeterUSB2TotalRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalUSB2
X=42
Y=0r
W=25
H=39
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=0,0,0
Solid=1
AntiAlias=1
Percentual=1

[MeterUSB2UsedRound]
Meter=ROUNDLINE
MeasureName=MeasureUsedUSB2
X=42
Y=0r
W=25
H=39
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=1
Percentual=1
Hidden=1

[MeterFreeUSB2TextPercent]
MeasureName=MeasureFreeUSB2
Meter=STRING
X=40
Y=10r
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
Text="%1%"
Percentual=1
AutoScale=1
Hidden=1

[MeterTotalUSB2Text]
MeasureName=MeasureTotalUSB2
Meter=STRING
X=100
Y=15
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="[#USB2#] %1B"
AutoScale=1

[MeterFreeUSB2Text]
MeasureName=MeasureFreeUSB2
Meter=STRING
X=100
Y=50
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="%1B"
Postfix=" Free"
AutoScale=1

[MeterRemovedUSB2Text]
Meter=STRING
X=100
Y=50
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="USB Removed"
AutoScale=1
Hidden=1



