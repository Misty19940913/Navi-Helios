

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500


License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"


[MeasureRing]
Measure=Calc
Formula=360

[MeasureNetIn]
Measure=NetIn
;MaxValue=1000000

[MeasureNetOut]
Measure=NetOut
;MaxValue=500000

[MeasureLAN]
Measure=Plugin
Plugin=Plugins\SysInfo.dll
SysInfoType=IP_ADDRESS
SysInfoData=0

[MeasureWAN]
Measure=Plugin
Plugin=Plugins\WebParser.dll
UpdateRate=21600
Url=http://cqcounter.com/whois/what_is_my_ip.php
RegExp="(?siU)<b>Your IP Address is (.*)</b>"
StringIndex=1

===============================================






[LabelLAN]
Meter=STRING
Text="Download speed"
X=90
Y=3
FontColor=255,0,0
FontFace=#FontFace#
StringAlign=LEFT
StringStyle=BOLD
FontSize=12
AntiAlias=1

[LabelWAN]
