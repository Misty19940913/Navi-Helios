

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500

License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"


;[GATHER DRIVES]==================================

[MeasureTotalDrive4]
Measure=FreeDiskSpace
Drive=#Drive4#
Total=1
UpdateDivider=2

[MeasureFreeDrive4]
Measure=FreeDiskSpace
Drive=#Drive4#
UpdateDivider=2

[MeasureUsedDrive4]
Measure=FreeDiskSpace
Drive=#Drive4#
InvertMeasure=1
UpdateDivider=2



;[MEASURE READS]==================================

[MeasureDrive4Reads]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Read Bytes/sec
PerfMonInstance=#Drive4#
PerfMonDifference=1



;[MEASURE WRITES]=================================

[MeasureDrive4Writes]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Write Bytes/sec
PerfMonInstance=#Drive4#
PerfMonDifference=1


;[READ ACTIONS]====================================

[Drive4ReadsAction]
Measure=Calc
Formula=MeasureDrive4Reads
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive4ReadsOff][!RainmeterShowMeter MeterDrive4ReadsOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive4ReadsOn][!RainmeterShowMeter MeterDrive4ReadsOff]
IfEqualValue=0



;[WRITE ACTIONS]===================================

[Drive4WritesAction]
Measure=Calc
Formula=MeasureDrive4Writes
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive4WritesOff][!RainmeterShowMeter MeterDrive4WritesOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive4WritesOn][!RainmeterShowMeter MeterDrive4WritesOff]
IfEqualValue=0



;[DISPLAY Drive4]========================================

[MeterDrive4TotalRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalDrive4
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor2#
Solid=1
AntiAlias=1
Percentual=1

[MeterDrive4UsedRound]
Meter=ROUNDLINE
MeasureName=MeasureUsedDrive4
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=1
Percentual=1

[MeterFreeDrive4Text%]
MeasureName=MeasureFreeDrive4
Meter=STRING
X=46
Y=38r
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
DynamicVariables=1
Text="%1%"
Percentual=1
AutoScale=1

[MeterTotalDrive4Text]
MeasureName=MeasureTotalDrive4
Meter=STRING
X=100
Y=15
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="[#Drive4#] %1B"
AutoScale=1

;[Drive4 READ LIGHTS]====================================

[MeterDrive4ReadsOn]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\lefton.png
Hidden=1

[MeterDrive4ReadsOff]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\leftoff.png
Hidden=0

;[Drive4 WRITE LIGHTS]====================================

[MeterDrive4WritesOn]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\righton.png
Hidden=1

[MeterDrive4WritesOff]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\rightoff.png
Hidden=0

[MeterFreeDrive4Text]
MeasureName=MeasureFreeDrive4
Meter=STRING
X=100
Y=50
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="%1B"
Postfix=" Free"
AutoScale=1

