

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500


License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"


;[GATHER DRIVES]==================================

[MeasureTotalDrive2]
Measure=FreeDiskSpace
Drive=#Drive2#
Total=1
UpdateDivider=2

[MeasureFreeDrive2]
Measure=FreeDiskSpace
Drive=#Drive2#
UpdateDivider=2

[MeasureUsedDrive2]
Measure=FreeDiskSpace
Drive=#Drive2#
InvertMeasure=1
UpdateDivider=2



;[MEASURE READS]==================================

[MeasureDrive2Reads]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Read Bytes/sec
PerfMonInstance=#Drive2#
PerfMonDifference=1



;[MEASURE WRITES]=================================

[MeasureDrive2Writes]
Measure=Plugin
Plugin=PerfMon.dll
PerfMonObject=LogicalDisk
PerfMonCounter=Disk Write Bytes/sec
PerfMonInstance=#Drive2#
PerfMonDifference=1


;[READ ACTIONS]====================================

[Drive2ReadsAction]
Measure=Calc
Formula=MeasureDrive2Reads
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive2ReadsOff][!RainmeterShowMeter MeterDrive2ReadsOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive2ReadsOn][!RainmeterShowMeter MeterDrive2ReadsOff]
IfEqualValue=0



;[WRITE ACTIONS]===================================

[Drive2WritesAction]
Measure=Calc
Formula=MeasureDrive2Writes
IfAboveAction=!execute [!RainmeterHideMeter MeterDrive2WritesOff][!RainmeterShowMeter MeterDrive2WritesOn]
IfAboveValue=0
IfEqualAction=!execute [!RainmeterHideMeter MeterDrive2WritesOn][!RainmeterShowMeter MeterDrive2WritesOff]
IfEqualValue=0



;[DISPLAY Drive2]========================================

[MeterDrive2TotalRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalDrive2
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor2#
Solid=1
AntiAlias=1
Percentual=1

[MeterDrive2UsedRound]
Meter=ROUNDLINE
MeasureName=MeasureUsedDrive2
X=0
Y=0r
W=108
H=87
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=1
Percentual=1

[MeterFreeDrive2Text%]
MeasureName=MeasureFreeDrive2
Meter=STRING
X=46
Y=38r
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
DynamicVariables=1
Text="%1%"
Percentual=1
AutoScale=1

[MeterTotalDrive2Text]
MeasureName=MeasureTotalDrive2
Meter=STRING
X=100
Y=15
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="[#Drive2#] %1B"
AutoScale=1

;[Drive2 READ LIGHTS]====================================

[MeterDrive2ReadsOn]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\lefton.png
Hidden=1

[MeterDrive2ReadsOff]
Meter=IMAGE
W=30
H=60
X=24
Y=14
ImageName=..\Images\leftoff.png
Hidden=0

;[Drive2 WRITE LIGHTS]====================================

[MeterDrive2WritesOn]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\righton.png
Hidden=1

[MeterDrive2WritesOff]
Meter=IMAGE
W=30
H=60
X=54
Y=14
ImageName=..\Images\rightoff.png
Hidden=0

[MeterFreeDrive2Text]
MeasureName=MeasureFreeDrive2
Meter=STRING
X=100
Y=50
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=11
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="%1B"
Postfix=" Free"
AutoScale=1

