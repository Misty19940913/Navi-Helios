

[Rainmeter]
Author=Gordan
Background=..\Images\bg.png
Update=500


License=Creative Commons Attribution-Non-Commercial-Share Alike 3.0

[Variables]
@Include="..\UserVariables.inc"



;[GATHER USB DRIVES]================================

[MeasureTotalUSB1]
Measure=FreeDiskSpace
Drive=#USB1#
Total=1
IgnoreRemovable=0
UpdateDivider=2

[CalcUSB1Removed]
Measure=CALC
Formula=MeasureTotalUSB1
Substitute=" G":""," k":""," M":""," T":""
IfBelowValue=1
IfBelowAction=!Execute [!RainmeterHideMeter MeterFreeUSB1TextPercent][!RainmeterShowMeter MeterUSB1UsedRound][!RainmeterHideMeter MeterFreeUSB1Text][!RainmeterShowMeter MeterUSB1Key][!RainmeterShowMeter MeterRemovedUSB1Text]
IfAboveValue=0
IfAboveAction=!Execute [!RainmeterShowMeter MeterFreeUSB1TextPercent][!RainmeterShowMeter MeterUSB1UsedRound][!RainmeterHideMeter MeterRemovedUSB1Text][!RainmeterHideMeter MeterUSB1Key][!RainmeterShowMeter MeterFreeUSB1Text]

[MeasureFreeUSB1]
Measure=FreeDiskSpace
Drive=#USB1#
IgnoreRemovable=0
UpdateDivider=2

[MeasureUsedUSB1]
Measure=FreeDiskSpace
Drive=#USB1#
InvertMeasure=1
IgnoreRemovable=0
UpdateDivider=2





;[DISPLAY USB1]==================================

[MeterUSB1Key]
Meter=IMAGE
ImageName="..\Images\USBKey.png"
X=42
Y=24r
W=25
H=39
Hidden=1

[MeterUSB1TotalRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalUSB1
X=42
Y=0r
W=25
H=39
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=0,0,0
Solid=1
AntiAlias=1
Percentual=1

[MeterUSB1UsedRound]
Meter=ROUNDLINE
MeasureName=MeasureUsedUSB1
X=42
Y=0r
W=25
H=39
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=1
Percentual=1
Hidden=1

[MeterFreeUSB1TextPercent]
MeasureName=MeasureFreeUSB1
Meter=STRING
X=40
Y=10r
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
Text="%1%"
Percentual=1
AutoScale=1
Hidden=1

[MeterTotalUSB1Text]
MeasureName=MeasureTotalUSB1
Meter=STRING
X=100
Y=15
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="[#USB1#] %1B"
AutoScale=1

[MeterFreeUSB1Text]
MeasureName=MeasureFreeUSB1
Meter=STRING
X=100
Y=50
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="%1B"
Postfix=" Free"
AutoScale=1

[MeterRemovedUSB1Text]
Meter=STRING
X=100
Y=50
FontFace=lcd
FontColor=#FontColor1#
FontSize=13
StringStyle=NORMAL
StringAlign=LEFT
AntiAlias=1
Text="USB Removed"
AutoScale=1
Hidden=1



