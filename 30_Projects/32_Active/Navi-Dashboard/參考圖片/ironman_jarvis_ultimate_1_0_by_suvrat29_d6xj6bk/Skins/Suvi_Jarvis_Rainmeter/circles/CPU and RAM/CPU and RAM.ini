[Rainmeter]
Author=Gordan
Background=..\Images\bg_ram_cpu.png
Update=500

[Metadata]
Name=
Information=
License=
Version=

[Variables]

@Include="..\UserVariables.inc"

[MeasureCPU]
Measure=CPU

[MeasureRAM]
Measure=PhysicalMemory

[MeasureTotalRAM]
Measure=PhysicalMemory
Drive=#RAM#
Total=1
UpdateDivider=2

[MeasurePower]
Measure=Plugin
PlugIn=PlugIns\PowerPlugin.dll
PowerState=PERCENT
UpdateDivider=10

; ----------------------------------

[CPU]
MeasureName=MeasureCPU
Meter=ROUNDLINE
X=0
Y=0r
W=108
H=87
LineWidth=5
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor1#
Solid=1
AntiAlias=10

[Power]
MeasureName=MeasurePower
Meter=ROUNDLINE
X=0
Y=0r
W=108
H=87
LineWidth=5
StartAngle=4.71238898
RotationAngle=6.28318531
LineLength=31
LineStart=36
LineColor=#LineColor2#
Solid=1
AntiAlias=10

[RAM]
MeasureName=MeasureRAM
Meter=ROUNDLINE
X=0
Y=0r
W=108
H=87
LineWidth=5
StartAngle=3.0
RotationAngle=6.2831853
LineLength=27
LineStart=15
LineColor=#LineColor1#
Solid=1
AntiAlias=10

[TotalRamRound]
Meter=ROUNDLINE
MeasureName=MeasureTotalRAM
X=0
Y=0r
W=108
H=87
LineWidth=5
StartAngle=3.0
RotationAngle=6.2831853
LineLength=27
LineStart=15
LineColor=#LineColor2#
Solid=1
AntiAlias=1
Percentual=1

-----------------------------------

;[GATHER MEMORY]==================================

[MeasurePhysMemTotal]
Measure=PhysicalMemory
Total=1
UpdateDivider=2

[MeasurePhysMemUsed]
Measure=PhysicalMemory
UpdateDivider=2

[MeasurePhysMemFree]
Measure=PhysicalMemory
InvertMeasure=1
UpdateDivider=2

;[PHYSICAL MEMORY]================================





[MeterFreeMemText%]
MeasureName=MeasurePhysMemFree
Meter=STRING
X=181
Y=19
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
DynamicVariables=1
Text="%1%"
Percentual=1
AutoScale=1

[MeterTotalMemText]
MeasureName=MeasurePhysMemTotal
Meter=STRING
X=95
Y=13
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=8
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
Text="RAM: %1B"
AutoScale=1

[MeterFreeMemText]
MeasureName=MeasurePhysMemFree
Meter=STRING
X=95
Y=27
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=8
StringStyle=BOLD
StringAlign=left
AntiAlias=1
Text="%1B"
postfix=" used"
AutoScale=1


;[Uptime]==================================

[MeasureUptime]
Measure=Uptime
Substitute="d":"d,",":":"h, "
UpdateDivider=120

[MeterUptimeLabel]
Meter=STRING
X=95
Y=0
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=LEFT
AntiAlias=1
Text="Uptime:"

[MeterUptimeText]
Meter=STRING
MeasureName=MeasureUpTime
W=160
H=15
X=140
Y=0
FontFace=#FontFace#
FontColor=#FontColor1#
FontSize=7
StringStyle=BOLD
StringAlign=left
AntiAlias=1
ClipString=1
Postfix="m"
Text="%1"



;===========================================
;  CPU Display
;===========================================

[MeasureCPU]
Measure=CPU



[MeasureCPUMHz]
Measure=Plugin
Plugin=Plugins\PowerPlugin.dll
PowerState=MHZ

[CPUGraph]
Meter=Line
MeasureName=MeasureCPU
X=95
Y=62
H=21
W=115
LineCount=1
LineColor=#LineColor1#
AntiAlias=0

[CPUGraph2]
Meter=HISTOGRAM
MeasureName=MeasureCPU
X=95
Y=61
H=21
W=115
PrimaryColor=#LineColor1#
AntiAlias=0

[l.MHz]
Meter=STRING
MeasureName=MeasureCPUMHz
X=95
Y=47
FontColor=#FontColor1#
FontSize=7
FontFace=#FontFace#
StringStyle=BOLD
StringAlign=left
Prefix="CPU: "
PostFix=" MHz"
AntiAlias=1


[MeterCPU]
Meter=STRING
MeasureName=MeasureCPU
X=66
Y=38
FontColor=#FontColor1#
Percentual=1
FontSize=7
StringStyle=BOLD
StringAlign=right
FontFace=#FontFace#
Postfix="%"
AntiAlias=1
AutoScale=1




