;===========================================
;  Rainmeter configuration file
;===========================================

[Rainmeter]
Author=SH Lee
AppVersion=2.6
Update=200

[Metadata]
Name=[Iron_Man_HUD]CPU_Network
Version=0.92
License=Creative Commons Attribution-Non-Commercial-Share Alike
Information=Displaying CPU & Network status, Temp, Fan Speed

[Variables]
PI=3.14159
fontColor1=204,204,204,255
fontColor2=A0A0FF
rndcolor=E57733
strAngle1=0.506
strAngle2=-1.1519
strAngle3=-1.0472
rndAngle1=3.2149
rndAngle2=3.6128
ImageW=346
ImageH=10
Switch=2
Switch0=1
Switch1=0
Switch2=3
Switch3=4
Switch4=5
Switch5=6
;-----------------------------------------------------
; Caution : SpeedFan index numbers begin with 0
;-----------------------------------------------------
CPUTempIndex=6
GPUTempIndex=0

CPUFanIndex=0
AuxFanIndex=1

[Background]
Meter=IMAGE
ImageName=SysBG.png
X=0
Y=0

[Picture]
Meter=Image
ImageName=IronMan#Switch#.png
x=158
y=125
LeftMouseUpAction=[!SetVariable Switch1 #Switch#][!SetVariable Switch #Switch0#][!SetVariable Switch0 #Switch1#][!SetVariable Switch1 #Switch2#][!SetVariable Switch2 #Switch#][!SetVariable Switch #Switch3#][!SetVariable Switch3 #Switch4#][!SetVariable Switch4 #Switch5#][!SetVariable Switch5 #Switch#][!SetVariable Switch #Switch0#][!SetVariable Switch0 #Switch1#][!SetVariable Switch1 #Switch2#][!SetVariable Switch2 #Switch3#]
DynamicVariables=1

;==========================================================
;Displaying CPU temprature and Fan speed 
;You need to have SpeedFan running for this plugin to work
;http://www.almico.com/speedfan.php  <-- Official Page
;http://www.almico.com/speedfan449.exe <--- Download
;==========================================================

[MeasureCPUTemp]
Measure=Plugin
Plugin=Plugins\SpeedFanPlugin.dll
SpeedFanType=TEMPERATURE
SpeedFanNumber=#CPUTempIndex#
SpeedFanScale=C
Updatedivider=20

[MeasureCalcCPU]
Measure=Calc
Formula=MeasureCPUTemp/6.52+184

[MeasureGPUTemp]
Measure=Plugin
Plugin=Plugins\SpeedFanPlugin.dll
SpeedFanType=TEMPERATURE
SpeedFanNumber=#GPUTempIndex#
SpeedFanScale=C
Updatedivider=20

[MeasureCalcGPU]
Measure=Calc
Formula=MeasureGPUTemp/6.52+184

[MeasureCPUFan]
Measure=Plugin
Plugin=Plugins\SpeedFanPlugin.dll
SpeedFanType=FAN
SpeedFanNumber=#CPUFanIndex#
Updatedivider=20

[MeasureCalcCPUFan]
Measure=Calc
Formula=((MeasureCPUFan/200) % 360)+184
MaxValue=360

[MeasureSysFan]
Measure=Plugin
Plugin=Plugins\SpeedFanPlugin.dll
SpeedFanType=FAN
SpeedFanNumber=#AuxFanIndex#
Updatedivider=20

[MeasureCalcSysFan]
Measure=Calc
Formula=((MeasureSysFan/200) % 360)+184
MaxValue=360

;==================================================
; Display Temp & Speed
;==================================================
[MeterCPUTemp1]
Meter=String
MeasureName=MeasureCPUTemp
x=191
y=112
FontColor=#fontColor1#
FontSize=8
StringAlign=RightBottom
Angle=#strAngle1#
AntiAlias=1
Text=%1ˇÉ 

[MeterCPUTemp2]
Meter=Roundline
MeasureName=MeasureCalcCPU
x=429
y=233
StartAngle=#rndAngle1#
RotationAngle=#rndAngle2#
LineLength=299
LineStart=286
LineColor=#rndColor#
Solid=1
ValueRemainder=184
AntiAlias=1

[MeterGPUTemp1]
Meter=String
MeasureName=MeasureGPUTemp
x=167
y=100
FontColor=#fontColor1#
FontSize=8
StringAlign=RightBottom
Angle=#strAngle1#
AntiAlias=1
Text=%1ˇÉ 

[MeterGPUTemp2]
Meter=Roundline
MeasureName=MeasureCalcGPU
x=429
y=233
StartAngle=#rndAngle1#
RotationAngle=#rndAngle2#
LineLength=326
LineStart=312
LineColor=#rndColor#
Solid=1
ValueRemainder=184
AntiAlias=1


[MeterCPUFan]
Meter=String
MeasureName=MeasureCPUFan
x=130
y=78
FontColor=#fontColor2#
FontSize=8
StringAlign=RightBottom
Angle=#strAngle2#
AntiAlias=1
Text=%1rpm

[MeterCPUFan2]
Meter=Rotator
MeasureName=MeasureCalcCPUFan
ImageName=arrow1.png
x=256
y=60
OffsetX=0
OffsetY=(#ImageH# / 2)
W=(SQRT(#ImageW# ** 2 + #ImageH# ** 2))
H=(SQRT(#ImageW# ** 2 + #ImageH# ** 2))
AntiAlias=1


[MeterSysFan]
Meter=String
MeasureName=MeasureSysFan
x=113
y=72
FontColor=#fontColor2#
FontSize=8
StringAlign=RightBottom
Angle=#strAngle2#
AntiAlias=1
Text=%1rpm

[MeterSysFan2]
Meter=Rotator
MeasureName=MeasureCalcSysFan
ImageName=arrow2.png
x=256
y=60
OffsetX=0
OffsetY=(#ImageH# / 2)
W=(SQRT(#ImageW# ** 2 + #ImageH# ** 2))
H=(SQRT(#ImageW# ** 2 + #ImageH# ** 2))
AntiAlias=1

