[Rainmeter]
Update=50
DynamicWindowSize=1

[Variables]
ImageW=340
ImageH=340

[MeasureRotate]
Measure=Calc
Formula=(MeasureRotate % 360) + 1
MaxValue=360

[MeterRotate]
Meter=Rotator
MeasureName=MeasureRotate
ImageName=JOC.png
RotationAngle=-5
OffsetX=(#ImageW# / 2)
OffsetY=(#ImageH# / 2)
W=#ImageW#
H=#ImageH#

[MeterRotate2]
Meter=Rotator
MeasureName=MeasureRotate
ImageName=JSP.png
RotationAngle=10
OffsetX=(#ImageW# / 2)
OffsetY=(#ImageH# / 2)
W=#ImageW#
H=#ImageH#

[MeterRotate3]
Meter=Rotator
MeasureName=MeasureRotate
ImageName=JCE.png
RotationAngle=10
OffsetX=(#ImageW# / 2)
OffsetY=(#ImageH# / 2)
W=#ImageW#
H=#ImageH#

[MeterRotate4]
